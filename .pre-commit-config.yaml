# AOCG AI Офис — фронтенд · pre-commit хуки
# Установка один раз: pip install pre-commit && pre-commit install
# Обновить версии: pre-commit autoupdate

repos:
  # --- Блокировка секретов ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- Базовая гигиена ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json

  # --- Prettier (форматирование JS/JSX/CSS) ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, css, json]
